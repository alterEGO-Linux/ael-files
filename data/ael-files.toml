[bin.busy]
filename    = "busy.sh"
type        = "bin"
description = "When the boss comes around to look busy."
src         = "/ael-files/bin/"
dst         = "/ael/bin/busy.sh"
symlinked   = true

[bin.extractor]
filename    = "extractor.sh"
type        = "bin"
description = "Compressed files universal extractor."
src         = "/ael-files/bin/"
dst         = "/ael/bin/extractor.sh"
symlinked   = true

[bin.snake-env]
filename    = ".snake-env.sh"
type        = "bin"
description = "Manage python -m venv."
src         = "/ael-files/bin"
dst         = "/ael/bin/.snake-env.sh"
symlinked   = true
notes       = ["This script must be sourced."]

[home.bashrc]
filename    = ".bashrc"
type        = "config/bash"
description = "Bash configuration file."
src         = "/ael-files/home"
dst         = "/home/.bashrc"
symlinked   = true
backup      = true

[home.profile]
filename    = ".profile"
type        = "config/shell"
description = "Loaded in non interactive shell."
src         = "/ael-files/home"
dst         = "/home/.profile"
symlinked   = true
backup      = true

[shellutils.ael-fzf]
filename    = "ael-fzf"
type        = "shellutils"
description = "FZF wrapper."
src         = "/ael-files/shellutils"
dst         = "/ael/shellutils/ael-fzf"
symlinked   = true

[shellutils.ansi-colors]
filename    = "ansi-colors"
type        = "shellutils"
description = "ANSI colors helper."
src         = "/ael-files/shellutils"
dst         = "/ael/shellutils/ansi-colors"
symlinked   = true

[shellutils.argument-parser]
filename    = "argument-parser"
type        = "shellutils"
description = "Argument parser utility."
src         = "/ael-files/shellutils"
dst         = "/ael/shellutils/argument-parser"
symlinked   = true

[shellutils.check-applications]
filename    = "check-applications"
type        = "shellutils"
description = "Function to check applications' availability."
src         = "/ael-files/shelltutils"
dst         = "/ael/shellutils/check-applications"
symlinked   = true

[shellutils.dircolors]
filename    = "dircolors"
type        = "shellutils"
description = "Terminal colors."
src         = "/ael-files/shellutils"
dst         = "/ael/shellutils/dircolors"
symlinked   = true

[tmux.tmux_conf]
filename    = ".tmux.conf"
type        = "config/tmux"
description = "Tmux configuration."
src         = "/ael-files/tmux"
dst         = "/home/.tmux.conf"
symlinked   = true
backup      = true

[vim.vimrc]
filename    = ".vimrc"
type        = "config/vim"
description = "vim configuration file."
src         = "/ael-files/vim/"
dst         = "/home/.vimrc"
symlinked   = true

